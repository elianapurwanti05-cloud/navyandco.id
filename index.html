<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navyandco.id Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0b132b,#1c2541,#3a506b);
color:white;
}

/* HERO */
.hero{
padding:20px;
text-align:center;
}

/* CART BTN */
#cartBtn{
position:fixed;
top:12px;
right:12px;
background:#3a506b;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
z-index:1000;
}

/* CATEGORY */
.category{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
padding:10px;
}

.cat-btn{
padding:10px 14px;
border:none;
border-radius:20px;
background:#1c2541;
color:white;
cursor:pointer;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

@media(max-width:900px){.container{grid-template-columns:2fr 2fr;}}
@media(max-width:600px){.container{grid-template-columns:1fr;}}

/* CARD */
.card{
background:#1c2541;
padding:15px;
border-radius:12px;
text-align:center;
}

/* BUTTON */
.btn{
padding:10px;
border:none;
border-radius:20px;
background:#5bc0be;
cursor:pointer;
margin-top:10px;
width:100%;
font-weight:600;
}

/* CART */
#cart{
position:fixed;
top:0;
right:-100%;
width:100%;
max-width:360px;
height:100%;
background:#1c2541;
transition:0.3s;
padding:15px;
overflow:auto;
z-index:999;
}

#cart.active{right:0;}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #3a506b;
}

.del{
background:red;
border:none;
color:white;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

.checkout{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
margin-top:10px;
font-weight:600;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.box{
background:#1c2541;
padding:20px;
border-radius:12px;
width:90%;
max-width:320px;
}

.paket{
padding:10px;
border:1px solid #3a506b;
border-radius:10px;
margin:6px 0;
cursor:pointer;
}

.habis{opacity:.4}

.small{font-size:12px;opacity:.8}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
color:white;
padding:12px 18px;
border-radius:10px;
opacity:0;
transition:0.3s;
z-index:2000;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-10px);}

/* JOIN GRUP */
.join-grup{
position:fixed;
bottom:70px;
right:12px;
z-index:1000;
}
.join-grup a{
background:#22c55e;
color:white;
padding:12px 14px;
border-radius:25px;
text-decoration:none;
font-weight:600;
display:block;
font-size:13px;
}

/* BROADCAST */
.broadcast{
position:fixed;
bottom:130px;
right:12px;
z-index:1000;
}
.broadcast button{
background:#3b82f6;
color:white;
border:none;
padding:12px 14px;
border-radius:25px;
font-weight:600;
cursor:pointer;
font-size:13px;
}
</style>
</head>

<body>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="hero">
<h1>Navyandco.id</h1>
<p>Marketplace Premium System</p>
</div>

<div class="category">
<button class="cat-btn" onclick="filter('Premium')">Premium</button>
<button class="cat-btn" onclick="filter('Sosmed')">Sosmed</button>
<button class="cat-btn" onclick="filter('Game')">Game</button>
<button class="cat-btn" onclick="render()">All</button>
</div>

<div class="container" id="list"></div>

<!-- CART -->
<div id="cart">
<div class="cart-header">
<h3>Keranjang</h3>
<span onclick="toggleCart()">❌</span>
</div>
<div id="cartBox"></div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="box">
<h3 id="title"></h3>
<div id="paketList"></div>
<button class="btn" onclick="closeModal()">Tutup</button>
</div>
</div>

<div id="toast"></div>

<!-- JOIN GRUP -->
<div class="join-grup">
<a href="https://chat.whatsapp.com/XXXXXXX" target="_blank">🔥 Join Grup VIP</a>
</div>

<!-- BROADCAST -->
<div class="broadcast">
<button onclick="promoBroadcast()">📢 Broadcast Promo</button>
</div>

<script>

const WA="6281234567890";

const products=[
{name:"Canva",cat:"Premium",paket:[{name:"1 Bulan",price:1000,stock:"Tersedia"}]},
{name:"Netflix",cat:"Premium",paket:[{name:"1 User",price:30000,stock:"Tersedia"}]},
{name:"CapCut",cat:"Premium",paket:[{name:"1 Bulan",price:19000,stock:"Tersedia"}]},
{name:"Instagram Views",cat:"Sosmed",paket:[{name:"1K Views",price:800,stock:"Tersedia"}]},
{name:"Free Fire Diamond",cat:"Game",paket:[{name:"100 Diamond",price:16000,stock:"Tersedia"}]}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let selected=null;

function render(data=products){
let h="";
data.forEach(p=>{
h+=`<div class="card">
<h3>${p.name}</h3>
<button class="btn" onclick="openModal('${p.name}')">Pilih Paket</button>
</div>`;
});
document.getElementById("list").innerHTML=h;
renderCart();
}

function filter(c){render(products.filter(p=>p.cat===c));}

function openModal(name){
selected=products.find(p=>p.name===name);

let h="";
document.getElementById("title").innerText=name;

selected.paket.forEach((p,i)=>{
h+=`<div class="paket" onclick="add(${i})">
<b>${p.name}</b><br>Rp ${p.price}
</div>`;
});

document.getElementById("paketList").innerHTML=h;
document.getElementById("modal").style.display="flex";
}

function closeModal(){document.getElementById("modal").style.display="none";}

function add(i){
let p=selected.paket[i];

cart.push({name:selected.name+" - "+p.name,price:p.price});
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
closeModal();
toast("✔ Masuk keranjang");
}

function renderCart(){
let h="",total=0;
cart.forEach((c,i)=>{
h+=`<div class="item">
<span>${c.name}</span>
<button class="del" onclick="hapus(${i})">X</button>
</div>`;
total+=c.price;
});

h+=`<hr><b>Total Rp ${total}</b>
<button class="checkout" onclick="checkout()">Checkout WA</button>`;

document.getElementById("cartBox").innerHTML=h;
document.getElementById("count").innerText=cart.length;
}

function hapus(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function checkout(){
let msg="ORDER NAVYANDCO.ID\n\n",total=0;
cart.forEach(c=>{msg+=`- ${c.name} Rp ${c.price}\n`;total+=c.price;});
msg+=`\nTOTAL: Rp ${total}`;
window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(msg));
}

function toggleCart(){document.getElementById("cart").classList.toggle("active");}

function toast(t){
let x=document.getElementById("toast");
x.innerText=t;
x.classList.add("show");
setTimeout(()=>x.classList.remove("show"),1500);
}

function promoBroadcast(){
let msg=`
🔥 PROMO NAVYANDCO.ID 🔥
Netflix mulai 15K
Canva 1K
FF Diamond murah
Order cepat 👉 https://wa.me/${WA}
`;
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

render();

</script>

</body>
</html>
