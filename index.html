<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navyandco.id - Shopee System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<meta name="theme-color" content="#0b132b">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0b132b,#1c2541,#3a506b);
color:white;
}

/* HEADER */
.hero{
padding:30px 20px 10px;
text-align:left;
}

.section-title{
text-align:center;
margin:10px 0;
}

/* CART ICON */
#cart-btn{
position:fixed;
top:15px;
right:20px;
background:#3a506b;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
z-index:1000;
font-size:13px;
}

/* CATEGORY */
.category{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.cat-btn{
padding:10px 15px;
border:none;
border-radius:20px;
background:#1c2541;
color:white;
cursor:pointer;
border:1px solid #3a506b;
}

/* PRODUCT */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:10px;
}

.card{
background:#1c2541;
padding:15px;
border-radius:12px;
text-align:center;
border:1px solid #3a506b;
}

.icon{font-size:32px;}

.btn{
padding:10px 15px;
border:none;
border-radius:25px;
cursor:pointer;
background:#5bc0be;
color:#0b132b;
font-weight:600;
margin-top:10px;
}

/* ================= CART SIDEBAR (SHOPEE STYLE) ================= */
#cart{
position:fixed;
top:0;
right:-360px;
width:340px;
height:100%;
background:#1c2541;
box-shadow:-5px 0 20px rgba(0,0,0,0.5);
padding:15px;
transition:0.3s;
z-index:999;
overflow-y:auto;
}

#cart.active{
right:0;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.close{
cursor:pointer;
font-size:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #3a506b;
}

.del{
background:red;
border:none;
color:white;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

.checkout{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-box{
background:#1c2541;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}

select{
width:100%;
padding:10px;
border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
.container{grid-template-columns:repeat(2,1fr);}
#cart{width:100%;}
}
@media(max-width:480px){
.container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- CART BUTTON -->
<div id="cart-btn" onclick="toggleCart()">
CART <span id="count">0</span>
</div>

<!-- HERO -->
<div class="hero">
<h1>Navyandco.id</h1>
<p>Marketplace System</p>
</div>

<h2 class="section-title">Pilihan Produk</h2>

<!-- CATEGORY -->
<div class="category">
<button class="cat-btn" onclick="filter('Premium')">Premium</button>
<button class="cat-btn" onclick="filter('Sosmed')">Sosmed</button>
<button class="cat-btn" onclick="filter('Game')">Game</button>
</div>

<!-- PRODUCT -->
<div class="container" id="list"></div>

<!-- CART -->
<div id="cart">
<div class="cart-header">
<h3>Keranjang</h3>
<span class="close" onclick="toggleCart()">❌</span>
</div>

<div id="cartBox"></div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h3 id="title"></h3>
<select id="paket"></select>
<br><br>
<button class="btn" onclick="add()">Tambah</button>
<button class="btn" onclick="closeModal()">Tutup</button>
</div>
</div>

<script>

const WA="6281234567890";

const products=[
{name:"Netflix",icon:"🎬",cat:"Premium",paket:[
{name:"1 Profile",price:14000},
{name:"Sharing",price:22000}
]},
{name:"Canva",icon:"🎨",cat:"Premium",paket:[
{name:"1 Bulan",price:8000}
]},
{name:"CapCut",icon:"✂️",cat:"Premium",paket:[
{name:"Pro",price:10000}
]},
{name:"IG Followers",icon:"📱",cat:"Sosmed",paket:[
{name:"1K Followers",price:10000}
]},
{name:"Mobile Legends",icon:"🎮",cat:"Game",paket:[
{name:"86 Diamond",price:20000}
]}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let selected=null;

/* CART TOGGLE */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* FILTER */
function filter(c){
render(products.filter(p=>p.cat===c));
}

/* RENDER */
function render(data=products){
let h="";
data.forEach(p=>{
h+=`
<div class="card">
<div class="icon">${p.icon}</div>
<h3>${p.name}</h3>
<button class="btn" onclick="openModal('${p.name}')">Pilih Paket</button>
</div>`;
});
document.getElementById("list").innerHTML=h;
updateCart();
renderCart();
}
render();

/* MODAL */
function openModal(name){
selected=products.find(p=>p.name===name);

let sel=document.getElementById("paket");
sel.innerHTML="";

selected.paket.forEach((p,i)=>{
sel.innerHTML+=`<option value="${i}">${p.name} - Rp ${p.price}</option>`;
});

document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=selected.name;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ADD CART */
function add(){
let i=document.getElementById("paket").value;
let p=selected.paket[i];

cart.push({name:selected.name+" - "+p.name,price:p.price});
localStorage.setItem("cart",JSON.stringify(cart));

closeModal();
renderCart();
updateCart();
}

/* CART */
function renderCart(){
let h="";
let total=0;

cart.forEach((c,i)=>{
h+=`
<div class="cart-item">
<span>${c.name}</span>
<button class="del" onclick="hapus(${i})">X</button>
</div>`;
total+=c.price;
});

h+=`
<hr>
<b>Total: Rp ${total}</b>
<button class="checkout" onclick="checkout()">Checkout WA</button>
`;

document.getElementById("cartBox").innerHTML=h;
document.getElementById("count").innerText=cart.length;
}

/* DELETE */
function hapus(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
updateCart();
}

/* CHECKOUT */
function checkout(){
let msg="ORDER NAVYANDCO.ID\n\n";
let total=0;

cart.forEach(c=>{
msg+=`- ${c.name} Rp ${c.price}\n`;
total+=c.price;
});

msg+=`\nTOTAL: Rp ${total}`;

window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(msg));
}

/* INIT */
function updateCart(){}

renderCart();

</script>

</body>
</html>
